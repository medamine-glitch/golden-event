<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Golden Event by Khaoula — Décoration d'Événements Premium</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Décoration d'événements de luxe à Meknès — Baby Showers, Anniversaires, Hennas & Mariages. Thèmes personnalisés, arches à ballons élégantes et installations uniques.">
  <meta name="theme-color" content="#D4AF37">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts: Cormorant Garamond for ultra-luxury headings + Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#D4AF37',
              light:   '#F0D060',
              pale:    '#FBF3CC',
              dark:    '#B8960C',
              deep:    '#9A7D0A',
            },
            cream:   '#FDFBF7',
            ivory:   '#FFFFF0',
            charcoal:'#1A1A1A',
            mist:    '#F5F3EE',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            serif:   ['"Playfair Display"', 'Georgia', 'serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'float':    'float 3.5s ease-in-out infinite',
            'fade-up':  'fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) both',
            'scale-in': 'scaleIn 0.4s cubic-bezier(0.22,1,0.36,1) both',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%':       { transform: 'translateY(-8px)' },
            },
            fadeSlideUp: {
              from: { opacity: '0', transform: 'translateY(20px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              from: { opacity: '0', transform: 'scale(0.94)' },
              to:   { opacity: '1', transform: 'scale(1)' },
            },
          },
          boxShadow: {
            'gold-sm': '0 2px 12px rgba(212,175,55,0.22)',
            'gold-md': '0 6px 24px rgba(212,175,55,0.28)',
            'gold-lg': '0 12px 48px rgba(212,175,55,0.22)',
            'gold-xl': '0 24px 64px rgba(212,175,55,0.18)',
          },
        }
      }
    }
  </script>
</head>
<body class="bg-cream antialiased">
  <app-root></app-root>
</body>
</html>
